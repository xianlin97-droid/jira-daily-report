name: Daily Jira Report

on:
  schedule:
    - cron: '0 8 * * 1-5'   # Runs at 8:00 AM UTC, Monday–Friday
  workflow_dispatch:          # Also lets you run it manually with a button

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install anthropic requests
      - name: Run daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
          POWER_AUTOMATE_WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
        run: python scripts/daily_report.py
